add_script_search_dir modm\\openocd

proc modm_itm_log { OUTPUT F_CPU {BAUDRATE 2000000} } {
	tpiu create itm.tpiu -dap [dap names] -ap-num 0 -protocol uart
	itm.tpiu configure -traceclk $F_CPU -pin-freq $BAUDRATE -output $OUTPUT
	itm.tpiu enable
	tpiu init
	itm port 0 on
}

proc modm_program { SOURCE } {
	program $SOURCE verify
	reset run
	shutdown
}

proc modm_rtt { {POLLING 1} {CHANNELS 1} {IDENTIFIER "SEGGER RTT"} } {
	set vtor [mrw 0xE000ED08]
	set ctrl [mrw [expr {$vtor + 0x20}]]
	if {$ctrl & 0x2} {
		set ctrl [expr {$ctrl & ~0x2}]
		puts [format "Info : Searching 0x%08x from IRQ table" $ctrl]
		rtt setup $ctrl 16 $IDENTIFIER
	} else {
		puts [format "Info : Searching \[0x20000000, 0x20018000\]"]
		rtt setup 0x20000000 98304 $IDENTIFIER
	}
	rtt start
	rtt polling_interval $POLLING
	puts [rtt channels]
	for {set i 0} {$i < $CHANNELS} {incr i} {
		rtt server start [expr {9090 + $i}] $i
	}
}
init